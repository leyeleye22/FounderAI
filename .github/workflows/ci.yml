name: founderai-ci

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Cache Hugging Face assets
        uses: actions/cache@v4
        with:
          path: .cache/huggingface
          key: ${{ runner.os }}-hf-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-hf-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Bytecode sanity check
        run: python -m compileall app tests scripts

      - name: Run test suite
        env:
          FOUNDER_AI_ENV: ci
          FOUNDER_AI_MODEL_DIR: ${{ github.workspace }}
          FOUNDER_AI_RAG_DIR: ${{ github.workspace }}/.rag
          FOUNDER_AI_USE_LOCAL_HEURISTICS: "true"
          USE_FINETUNED_MODEL: "false"
          HF_HOME: ${{ github.workspace }}/.cache/huggingface
        run: pytest tests -q
